---
- name: Install ghostty (Arch)
  become: true
  community.general.pacman:
    name: ghostty
    state: present
  when: ansible_facts['os_family'] == "Archlinux"

- name: Install ghostty via Homebrew (macOS)
  community.general.homebrew_cask:
    name: ghostty
    state: present
  when: ansible_facts['os_family'] == "Darwin"
