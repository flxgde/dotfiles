---
- name: Fail on unsupported OS family
  ansible.builtin.assert:
    that: ansible_facts['os_family'] in ghostty_supported_os_families
    fail_msg: >-
      ghostty role does not support os_family={{ ansible_facts['os_family'] }}.
      Supported: {{ ghostty_supported_os_families | join(', ') }}.

- name: Install ghostty
  ansible.builtin.import_tasks: install.yml

- name: Symlink ghostty config from dotfiles
  ansible.builtin.import_tasks: symlink.yml
