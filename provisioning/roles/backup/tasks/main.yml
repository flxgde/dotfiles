---
- name: Ensure backup directory exists
  become: false
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/dotfiles-backups"
    state: directory
    mode: "0755"

- name: Compute timestamp
  ansible.builtin.set_fact:
    backup_stamp: "{{ ansible_date_time.iso8601_basic_short }}"

- name: Detect which paths exist (so we don't tar nonexistent ones)
  become: false
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/{{ item }}"
  loop:
    - .config
    - .zshrc
    - .local/bin
  register: backup_targets

- name: Build list of existing paths
  ansible.builtin.set_fact:
    backup_paths: "{{ backup_targets.results | selectattr('stat.exists') | map(attribute='item') | list }}"

- name: Fail if nothing to back up
  ansible.builtin.assert:
    that: backup_paths | length > 0
    fail_msg: "None of the expected paths exist under $HOME — nothing to back up."

- name: Create backup tarball
  become: false
  ansible.builtin.command:
    cmd: >-
      tar czf
      {{ ansible_facts['env']['HOME'] }}/dotfiles-backups/{{ backup_stamp }}.tar.gz
      -C {{ ansible_facts['env']['HOME'] }}
      {{ backup_paths | join(' ') }}
  register: backup_tar
  changed_when: true

- name: Report backup location
  ansible.builtin.debug:
    msg: >-
      Backup written to
      {{ ansible_facts['env']['HOME'] }}/dotfiles-backups/{{ backup_stamp }}.tar.gz
      (covered: {{ backup_paths | join(', ') }})
