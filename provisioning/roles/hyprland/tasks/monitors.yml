---
- name: Stat ~/.config/hypr/monitors.conf
  become: false
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/hypr/monitors.conf"
  register: monitors_stat

- name: Write monitors.conf starter if missing
  become: false
  ansible.builtin.copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/hypr/monitors.conf"
    mode: "0644"
    content: |
      # Host-specific monitor config. NOT tracked in dotfiles.
      # See https://wiki.hypr.land/Configuring/Monitors/
      # Run `hyprctl monitors` to inspect connected displays.
      #
      # Format: monitor = <name>, <resolution>@<refresh>, <position>, <scale>
      #
      # monitor = ,preferred,auto,1
  when: not monitors_stat.stat.exists
