---
- name: Ensure ~/.config/hypr exists
  become: false
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/hypr"
    state: directory
    mode: "0755"

- name: List hypr config files in repo
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../.config/hypr"
    file_type: file
  delegate_to: localhost
  register: hypr_files

- name: Stat each target in ~/.config/hypr
  become: false
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/hypr/{{ item.path | basename }}"
  loop: "{{ hypr_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  register: hypr_target_stats

- name: Remove existing real (non-symlink) files at symlink targets
  become: false
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/hypr/{{ item.item.path | basename }}"
    state: absent
  loop: "{{ hypr_target_stats.results }}"
  loop_control:
    label: "{{ item.item.path | basename }}"
  when: item.stat.exists and not item.stat.islnk

- name: Symlink each hypr config file from repo
  become: false
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/hypr/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ hypr_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
