---
- name: Fail on unsupported OS family
  ansible.builtin.assert:
    that: ansible_facts['os_family'] in tmux_supported_os_families
    fail_msg: >-
      tmux role does not support os_family={{ ansible_facts['os_family'] }}.
      Supported: {{ tmux_supported_os_families | join(', ') }}.

- name: Install tmux
  ansible.builtin.import_tasks: install.yml

- name: Symlink tmux config from dotfiles
  ansible.builtin.import_tasks: symlink.yml
