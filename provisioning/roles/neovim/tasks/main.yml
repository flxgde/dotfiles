---
- name: Fail on unsupported OS family
  ansible.builtin.assert:
    that: ansible_facts['os_family'] in neovim_supported_os_families
    fail_msg: >-
      neovim role does not support os_family={{ ansible_facts['os_family'] }}.
      Supported: {{ neovim_supported_os_families | join(', ') }}.

- name: Install neovim
  ansible.builtin.import_tasks: install.yml

- name: Symlink neovim config from dotfiles
  ansible.builtin.import_tasks: symlink.yml
