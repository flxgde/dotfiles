---
- name: Fail on unsupported OS family
  ansible.builtin.assert:
    that: ansible_facts['os_family'] in zsh_supported_os_families
    fail_msg: >-
      zsh role does not support os_family={{ ansible_facts['os_family'] }}.
      Supported: {{ zsh_supported_os_families | join(', ') }}.

- name: Install zsh + zoxide
  ansible.builtin.import_tasks: install.yml

- name: Symlink .zshrc from dotfiles
  ansible.builtin.import_tasks: symlink.yml
