set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0

set-option -g prefix C-b
bind-key C-b send-prefix

bind r source-file ~/.config/tmux/tmux.conf
set -g base-index 1
set -g history-limit 10000

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
unbind o
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# forget the find window.  That is for chumps
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind-key -r Escape run-shell "tmux neww ~/.local/bin/tmux-switch-session"
bind-key -r H run-shell "tmux neww ~/.local/bin/tmux-sessionizer nvim"

# Switch to session by index: prefix + s, then <n>
bind-key s switch-client -T session
bind-key -T session h switch-client -p
bind-key -T session l switch-client -n
bind-key -T session 1 run-shell "tmux switch-client -t \"$(tmux list-sessions -F '##{session_name}' | sed -n 1p)\""
bind-key -T session 2 run-shell "tmux switch-client -t \"$(tmux list-sessions -F '##{session_name}' | sed -n 2p)\""
bind-key -T session 3 run-shell "tmux switch-client -t \"$(tmux list-sessions -F '##{session_name}' | sed -n 3p)\""
bind-key -T session 4 run-shell "tmux switch-client -t \"$(tmux list-sessions -F '##{session_name}' | sed -n 4p)\""
bind-key -T session 5 run-shell "tmux switch-client -t \"$(tmux list-sessions -F '##{session_name}' | sed -n 5p)\""
bind-key -T session 6 run-shell "tmux switch-client -t \"$(tmux list-sessions -F '##{session_name}' | sed -n 6p)\""
bind-key -T session 7 run-shell "tmux switch-client -t \"$(tmux list-sessions -F '##{session_name}' | sed -n 7p)\""
bind-key -T session 8 run-shell "tmux switch-client -t \"$(tmux list-sessions -F '##{session_name}' | sed -n 8p)\""
bind-key -T session 9 run-shell "tmux switch-client -t \"$(tmux list-sessions -F '##{session_name}' | sed -n 9p)\""

# cheat.sh popup
bind-key -r i run-shell "tmux neww ~/.local/bin/tmux-cht.sh"

# lazygit popup
bind-key g display-popup -d "#{pane_current_path}" -w 90% -h 85% -E "lazygit"

