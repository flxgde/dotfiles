# --- Workspace -> monitor pinning (1-5 on DP-1, 6-10 on DP-2) ---
workspace = 1, monitor:DP-1, default:true, persistent:true, defaultName:1 Browser
workspace = 2, monitor:DP-1, persistent:true, defaultName:2 KI
workspace = 3, monitor:DP-1, persistent:true, defaultName:3 Misc
workspace = 4, monitor:DP-1, persistent:true, defaultName:4 Misc
workspace = 5, monitor:DP-1, persistent:true, defaultName:5 Misc
workspace = 6, monitor:DP-2, default:true, persistent:true, defaultName:6 Terminal
workspace = 7, monitor:DP-2, persistent:true, defaultName:7 IDE
workspace = 8, monitor:DP-2, persistent:true, defaultName:8 Spotify
workspace = 9, monitor:DP-2, persistent:true, defaultName:9 Mail
workspace = 10, monitor:DP-2, persistent:true, defaultName:10 Misc

# --- Window -> workspace routing ---
windowrule = workspace 1, match:class ^(brave-browser)$
windowrule = workspace 1, match:class ^(chromium)$
windowrule = workspace 6, match:class ^(com.mitchellh.ghostty)$
windowrule = workspace 7, match:class ^(jetbrains-idea)$
windowrule = workspace 8, match:class ^(spotify)$
