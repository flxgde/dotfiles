# --- Unbind Omarchy defaults that clash with vim-style nav ---
unbind = SUPER, J
unbind = SUPER, K
unbind = SUPER, L

# --- Vim-style window focus ---
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

# --- Re-home Omarchy features displaced by vim nav ---
bind = SUPER SHIFT, J, layoutmsg, togglesplit
bind = SUPER SHIFT, K, exec, omarchy-menu-keybindings
bind = SUPER SHIFT, L, exec, omarchy-hyprland-workspace-layout-toggle
